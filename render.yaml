# Blueprint Render: garante build/start a partir da pasta server (evita deploy sem as rotas novas).
# Conecte o repositório em https://dashboard.render.com → New → Blueprint (ou ajuste o serviço manual para igualar).
services:
  - type: web
    name: rango-de-rua-api
    runtime: node
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
