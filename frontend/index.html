<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Rango de Rua – ONG que leva marmitas e dignidade para quem mais precisa nas ruas. Seja voluntário ou faça uma doação." />
    <meta property="og:title" content="Rango de Rua" />
    <meta property="og:description" content="13 anos levando marmitas e afeto para as ruas. Faça parte dessa corrente do bem." />
    <meta property="og:type" content="website" />
    <title>Rango de Rua – Alimentando com amor desde 2013</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      // GitHub Pages SPA: restore path from redirect
      (function() {
        var l = window.location;
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + (decoded[0] ? '/' + decoded[0] : '') +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
